name: CI

on:
  # PRs are covered by `pull_request`; the queue by `merge_group`. Restricting
  # `push` to main avoids a duplicate run on every PR branch (push + pull_request)
  # while still validating main after a merge-queue merge.
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (engines.node >=22), a current major, and the mise-pinned dev
        # version. MISE_NODE_VERSION overrides mise.toml's `node` per cell.
        node: ['22', '24', '26.3.0']
    env:
      MISE_NODE_VERSION: ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      # mise-action caches the toolchain; cache npm's download store too so
      # `npm ci` stays fast (the parity replacement for setup-node's cache: npm).
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ matrix.node }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ matrix.node }}-
      - run: npm ci
      - run: npm run check
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx publint
      - run: npm run attw

  # Single, stable required status check for branch protection. Runs after the
  # whole `build` matrix (needs: [build]) and is green only if every leg
  # succeeded — `needs.build.result` is the matrix's aggregate result, so this
  # is 'success' iff all legs passed (else failure/cancelled/skipped). Lets the
  # ruleset require one context ("Required") regardless of matrix size; runs in
  # the merge queue (merge_group) too.
  Required:
    if: ${{ always() }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify the build matrix succeeded
        run: |
          echo "build matrix result: ${{ needs.build.result }}"
          test "${{ needs.build.result }}" = "success"
