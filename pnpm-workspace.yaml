packages:
  - packages/*

# tsup bundles with esbuild, whose build step pnpm blocks by default. pnpm 11
# uses `allowBuilds` (a name -> bool map) to approve specific packages.
allowBuilds:
  esbuild: true

overrides:
  # Force the patched esbuild across the whole workspace. tsup pins a vulnerable
  # ^0.27.0 (< the 0.28.1 fix for the dev-only RCE/file-read advisories).
  esbuild: "^0.28.1"
  # The AI SDK chain's zod peer otherwise resolves to two versions (3.25.76 and
  # 4.4.3), which duplicates @ai-sdk/provider-utils (where Tool/ToolSet are
  # defined) and breaks HarnessAgent type identity. Pin a single zod so the
  # whole monorepo shares one copy.
  zod: "4.4.3"

# Excludes for pnpm's `minimumReleaseAge` supply-chain delay (when configured),
# so the fast-moving Vercel AI SDK packages stay installable immediately.
minimumReleaseAgeExclude:
  - "@ai-sdk/anthropic"
  - "@ai-sdk/gateway"
  - "@ai-sdk/react"
  - "@ai-sdk/harness"
  - "@ai-sdk/harness-claude-code"
  - "@ai-sdk/openai-compatible"
  - "@ai-sdk/provider"
  - "@ai-sdk/provider-utils"
  - "@ai-sdk/tui"
  - "ai"
  - "@ai-sdk/mcp@2.0.10"
